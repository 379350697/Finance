services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      FINANCE_DATABASE_URL: postgresql+psycopg://finance:finance@postgres:5432/finance
      FINANCE_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      FINANCE_DATABASE_URL: postgresql+psycopg://finance:finance@postgres:5432/finance
      FINANCE_REDIS_URL: redis://redis:6379/0
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=INFO
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
