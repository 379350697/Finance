<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A股策略助手 — 智能量化策略模拟、回测与AI选股平台" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>A 股策略助手</title>
    <script>
      // Apply theme before any paint to prevent flash of unstyled content
      (function(){try{var t=localStorage.getItem("finance-theme")||"terminal-dark";document.documentElement.setAttribute("data-theme",t)}catch(e){}})();
    </script>
    <script>
      // Catch unhandled errors and display them
      window.onerror = function(msg, url, line, col, err) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding:40px;color:#ff4455;font:14px monospace;background:#0a0a0f;min-height:100vh"><h2>JS Error</h2><pre style="white-space:pre-wrap">' +
            (err && err.stack ? err.stack.replace(/</g,'&lt;') : msg + ' at ' + url + ':' + line) +
            '</pre></div>';
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var root = document.getElementById('root');
        if (root && root.innerHTML.trim() === '') {
          root.innerHTML = '<div style="padding:40px;color:#f0a030;font:14px monospace;background:#0a0a0f;min-height:100vh"><h2>Unhandled Promise Rejection</h2><pre style="white-space:pre-wrap">' +
            (e.reason && e.reason.stack ? String(e.reason.stack).replace(/</g,'&lt;') : String(e.reason)) +
            '</pre></div>';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
